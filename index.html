<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOZETHCPM1 - APK Hub</title>
    <!-- Enlace a tu CSS (lo mejoraremos después) -->
    <link rel="stylesheet" href="assets/style.css">
    <!-- Para los íconos de las tarjetas (opcional, pero queda bien) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header>
        <div class="header-content">
            <h1>📱 JOZETHCPM1 APK Hub</h1>
            <p class="subtitle">Tu centro de descargas y herramientas</p>
        </div>
        <div class="socials">
            <a href="https://www.youtube.com/@JOZETHCPM1" target="_blank" title="YouTube">
                <img src="assets/youtube.png" alt="YouTube" onerror="this.src='https://via.placeholder.com/32?text=YT'">
            </a>
            <a href="https://www.tiktok.com/@jozethcpm0" target="_blank" title="TikTok">
                <img src="assets/tiktok.png" alt="TikTok" onerror="this.src='https://via.placeholder.com/32?text=TT'">
            </a>
        </div>
    </header>

    <nav>
        <button class="tab-btn active" onclick="openTab('apps')">📦 Apps</button>
        <button class="tab-btn" onclick="openTab('games')">🎮 Juegos</button>
        <button class="tab-btn" onclick="openTab('files')">📁 Archivos</button>
        <button class="tab-btn" onclick="openTab('videos')">🎬 Videos</button>
    </nav>

    <div class="search-container">
        <i class="fas fa-search search-icon"></i>
        <input type="text" id="search" placeholder="Buscar aplicaciones, juegos o archivos..." oninput="searchItems()">
    </div>

    <!-- Contenedor de las pestañas -->
    <main>
        <div id="apps" class="tab-content" style="display:block;"></div>
        <div id="games" class="tab-content" style="display:none;"></div>
        <div id="files" class="tab-content" style="display:none;"></div>
        <div id="videos" class="tab-content" style="display:none;"></div>
    </main>

    <footer>
        <p>© 2024 JOZETHCPM1. Todos los recursos son enlaces externos.</p>
    </footer>

    <!-- Script principal -->
    <script src="assets/app.js"></script>
    <!-- Script para los íconos de Font Awesome (si los usas) -->
    <script src="https://kit.fontawesome.com/yourcode.js" crossorigin="anonymous"></script> <!-- Opcional -->
</body>
</html>
